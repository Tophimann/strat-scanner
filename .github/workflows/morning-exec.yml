name: Morning Executor

on:
  schedule:
    # 13:15 UTC = 15:15 CEST (summer) / 14:15 CET (winter) — before US market open (14:30 UTC)
    - cron: '15 13 * * 1-5'
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Morning Executor
        run: python stock_strategy_executor.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
